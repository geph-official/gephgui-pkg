name: CI

on:
  push:
    branches: [master, next]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [master, next]

jobs:
  build_macos:
    runs-on: macos-14-large
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: "recursive"
          fetch-depth: 0
      - name: Fetch all tags
        run: git fetch --tags --force
      - name: Set up Rust
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup target add x86_64-apple-darwin aarch64-apple-darwin
      # Cache Rust dependencies
      # - uses: actions/cache@v3
      #   with:
      #     path: |
      #       ~/.cargo/bin/
      #       ~/.cargo/registry/index/
      #       ~/.cargo/registry/cache/
      #       ~/.cargo/git/db/
      #       target/
      #     key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      #     restore-keys: |
      #       ${{ runner.os }}-cargo-
      # # Cache NPM dependencies
      # - uses: actions/cache@v3
      #   with:
      #     path: gephgui-wry/gephgui/node_modules
      #     key: ${{ runner.os }}-npm-${{ hashFiles('gephgui-wry/gephgui/package-lock.json') }}
      #     restore-keys: |
      #       ${{ runner.os }}-npm-
      - name: Build macOS
        run: |
          export VERSION=$(git describe --always)
          ./build-macos.bash
      - uses: actions/upload-artifact@v4
        with:
          name: geph-macos
          path: output/geph-macos-*.pkg

  build_flatpak:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: "recursive"
          fetch-depth: 0
      - name: Fetch all tags
        run: git fetch --tags --force
      - name: Install dependencies
        run: |
          export VERSION=$(git describe --always)
          sudo apt update
          sudo apt install flatpak-builder flatpak ca-certificates
          git config --global protocol.file.allow always
      - name: Set up Flatpak
        run: |
          export VERSION=$(git describe --always)
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
      # Cache Flatpak build. Build state now lives in machine-local dirs (see
      # build-common.bash): ~/.cache/gephgui-pkg holds the host-side staging +
      # cargo target and the flatpak-builder state/repo; /var/tmp/geph-flatpak-cache
      # is the in-sandbox rustup/cargo/npm cache the manifest mounts.
      - uses: actions/cache@v3
        with:
          path: |
            ~/.local/share/flatpak
            ~/.cache/flatpak
            ~/.cache/gephgui-pkg
            /var/tmp/geph-flatpak-cache
          key: ${{ runner.os }}-flatpak-${{ hashFiles('flatpak/io.geph.GephGui.yml') }}
          restore-keys: |
            ${{ runner.os }}-flatpak-
      # build-flatpak.bash also builds the static musl geph5 + geph5-client host
      # blobs that the manifest's `host-manager-bin` module bundles.
      - name: Build Flatpak
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          source "$HOME/.cargo/env"
          sudo apt install -y musl-tools
          ./build-flatpak.bash
      - uses: actions/upload-artifact@v4
        with:
          name: geph-flatpak
          path: output/geph-linux-*.flatpak

  build_deb_oldubuntu:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: "recursive"
          fetch-depth: 0
      - name: Fetch all tags
        run: git fetch --tags --force
      # Cache the machine-local build root the containerized build writes to
      # (staged sources, cargo target, rustup/cargo homes, npm cache — see
      # build-deb.bash, which mounts it at /cache).
      - uses: actions/cache@v3
        with:
          path: /var/tmp/geph-deb-cache
          key: ${{ runner.os }}-deb-oldubuntu-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-deb-oldubuntu-
      # Builds inside an Ubuntu 22.04 container for a predictably old glibc.
      - name: Build Debian package
        run: ./build-deb.bash
      - name: Find Debian package
        id: find-deb
        run: |
          DEB_FILE=$(find output -name "*.deb" | head -n 1)
          echo "DEB_FILE=$DEB_FILE" >> $GITHUB_ENV
          echo "Found Debian package: $DEB_FILE"
      - uses: actions/upload-artifact@v4
        with:
          name: geph-deb-oldubuntu
          path: ${{ env.DEB_FILE }}

  build_windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: "recursive"
          fetch-depth: 0
      - name: Fetch all tags
        run: git fetch --tags --force
      - name: dump out version
        run: git describe --always
      - name: Set up Rust
        run: |
          curl https://win.rustup.rs/ -o rustup-init.exe
          ./rustup-init -y --default-toolchain "stable-i686-pc-windows-msvc" --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      # Cache Rust dependencies. The cargo target dir now lives in the
      # machine-local build root ~/.cache/gephgui-pkg (see build-common.bash).
      - uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cache/gephgui-pkg/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      # Cache NPM dependencies (installed into the staged copy of the frontend
      # under the machine-local build root).
      - uses: actions/cache@v3
        with:
          path: ~/.cache/gephgui-pkg/src/gephgui-wry/gephgui/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('gephgui-wry/gephgui/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Build Windows
        run: |
          $env:VERSION = $(git describe --always)
          $env:PATH += ";C:\Users\runneradmin\.cargo\bin"
          $env:CARGO_NET_GIT_FETCH_WITH_CLI = "true"
          bash build-windows.bash
      - uses: actions/upload-artifact@v4
        with:
          name: geph-windows
          path: output/geph-windows-*.exe

  create_github_release:
    runs-on: ubuntu-24.04
    needs: [build_macos, build_flatpak, build_windows, build_deb_oldubuntu]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      - name: Find Debian package
        id: find-deb
        run: |
          export VERSION=$(git describe --always)
          DEB_FILE=$(find ./artifacts/geph-deb-oldubuntu -type f -name "*.deb" | head -n 1)
          echo "DEB_PATH=$DEB_FILE" >> $GITHUB_OUTPUT
          DEB_FILENAME=$(basename "$DEB_FILE")
          echo "DEB_FILENAME=$DEB_FILENAME" >> $GITHUB_OUTPUT
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: Geph ${{ github.ref_name }}
          draft: false
          prerelease: true
          files: |
            ./artifacts/geph-macos/geph-macos-*.pkg
            ./artifacts/geph-flatpak/geph-linux-*.flatpak
            ./artifacts/geph-windows/geph-windows-*.exe
            ${{ steps.find-deb.outputs.DEB_PATH }}
          generate_release_notes: false

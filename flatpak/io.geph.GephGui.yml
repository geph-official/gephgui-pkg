app-id: io.geph.GephGui
runtime: org.gnome.Platform
runtime-version: "47"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22
command: "gephgui-wry"
modules:
  - name: gephgui-wry
    buildsystem: "simple"
    build-commands:
      - |
        if [ -d .pkg-git ]; then
          VERSION=$(git --git-dir=.pkg-git describe --always 2>/dev/null || git --git-dir=.pkg-git rev-parse --short HEAD)
        else
          VERSION="dev"
        fi
        printf "%s" "$VERSION" > .version
      - "export VERSION=$(cat .version) && (cd gephgui && npm i -f && npm run build)"
      - |
        export VERSION="$(cat .version)"
        export CARGO_HOME=/run/build/gephgui-wry/cargo
        export RUSTUP_HOME=/run/build/gephgui-wry/rustup
        export PATH="$CARGO_HOME/bin:$PATH"
        export RUSTUP_INIT_SKIP_PATH_CHECK=yes
        curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain 1.94.1
        rustc --version
        cargo --version
        cargo build --release --locked
      - "install -D ./target/release/gephgui-wry -t /app/bin"
    sources:
      - type: dir
        path: "../gephgui-wry"
      - type: dir
        path: "../.git"
        dest: ".pkg-git"
  - name: blobs
    buildsystem: "simple"
    build-commands:
      - "install -D pac-real -t /app/bin"
      - "install -D pac -t /app/bin"
    sources:
      - type: dir
        path: "../blobs/linux-x64"
  - name: icons
    buildsystem: "simple"
    sources:
      - type: dir
        path: "../flatpak/icons"
    build-commands:
      - "mkdir -p /app/share/icons/hicolor/"
      - "mv *x* /app/share/icons/hicolor/"
      - "mkdir -p /app/share/applications"
      - "cp io.geph.GephGui.desktop /app/share/applications"
build-options:
  append-path: "/usr/lib/sdk/node22/bin"
  build-args:
    - --share=network
finish-args:
  # X11 + XShm access
  - --share=ipc
  - --socket=x11
  # Wayland access
  - --socket=wayland
  # Needs to talk to the network:
  - --share=network
  # Needed for OpenGL
  - --device=dri
  # DConf access for configuring proxies
  - --filesystem=host:rw
  - --talk-name=ca.desrt.dconf
  - --talk-name=org.freedesktop.Flatpak
  - --env=DCONF_USER_CONFIG_DIR=.config/dconf
